<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ray Hernaez | Projects</title>
    <meta
      name="description"
      content="Project archive for Ray Hernaez, featuring work across game design, digital art, and visual storytelling."
    />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&family=Inter:ital,wght@0,500;0,600;0,700;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="projects-page">
    <div class="page-shell page-shell--projects">
      <main class="projects-page__main">
        <section class="projects-stage" aria-labelledby="projects-page-heading">
          <div class="projects-stage__header">
            <nav class="hero-stage__actions hero-stage__actions--nav" aria-label="Projects page navigation">
              <a class="hero-stage__action hero-stage__action--ghost" href="index.html">Home</a>
              <span class="hero-stage__divider" aria-hidden="true"></span>
              <a class="hero-stage__action hero-stage__action--solid" href="projects.html" aria-current="page">Projects</a>
              <span class="hero-stage__divider" aria-hidden="true"></span>
              <a class="hero-stage__action hero-stage__action--ghost" href="contact.html">Contact</a>
            </nav>
            <h1 id="projects-page-heading" class="hero-stage__name">
              <span class="hero-stage__name-accent">ray</span><span class="hero-stage__name-main">hernaez</span>
            </h1>
            <p class="hero-stage__kicker projects-stage__label">Projects</p>
          </div>

          <section class="archive-section archive-section--page" aria-labelledby="projects-archive-heading">
            <h2 class="sr-only" id="projects-archive-heading">Projects archive</h2>

            <div class="archive-grid">
              <article class="archive-card">
                <figure class="archive-card__figure">
                  <img
                    class="archive-card__image"
                    src="assets/images/spirit-camper/3.png"
                    alt="Spirit Camper cover image"
                    draggable="false"
                  />
                </figure>
                <button class="archive-card__name-link" type="button">Spirit Camper</button>
              </article>

              <article class="archive-card">
                <figure class="archive-card__figure">
                  <img class="archive-card__image" src="assets/images/sheldon/3.png" alt="Sheldon cover image" draggable="false" />
                </figure>
                <button class="archive-card__name-link" type="button">Sheldon</button>
              </article>

              <article class="archive-card">
                <figure class="archive-card__figure">
                  <img
                    class="archive-card__image"
                    src="assets/images/vampire-slayer/2.jpg"
                    alt="Vampire Slayer cover image"
                    draggable="false"
                  />
                </figure>
                <button class="archive-card__name-link" type="button">Vampire Slayer</button>
              </article>

              <article class="archive-card">
                <figure class="archive-card__figure">
                  <img class="archive-card__image" src="assets/images/evil/2.jpg" alt="E.V.I.L. cover image" draggable="false" />
                </figure>
                <button class="archive-card__name-link" type="button">E.V.I.L.</button>
              </article>

              <article class="archive-card">
                <figure class="archive-card__figure">
                  <img
                    class="archive-card__image"
                    src="assets/images/the-heavy-20s/5.png"
                    alt="The Heavy 20s cover image"
                    draggable="false"
                  />
                </figure>
                <button class="archive-card__name-link" type="button">The Heavy 20s</button>
              </article>

              <article class="archive-card">
                <figure class="archive-card__figure">
                  <img class="archive-card__image" src="assets/images/frottage/1.jpg" alt="Frottage cover image" draggable="false" />
                </figure>
                <button class="archive-card__name-link" type="button">Frottage</button>
              </article>
            </div>
          </section>
        </section>
      </main>

      <footer class="site-footer" data-site-footer></footer>
    </div>

    <script src="js/shared-layout.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
